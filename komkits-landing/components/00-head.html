<style>
  /* ================= base: tokens + reset + shared primitives ================= */
  :root{
    --ink-900:#111214; --ink-700:#3F3F46; --ink-500:#6B7280; --ink-400:#9CA3AF;
    --grey-50:#FAFAFA; --grey-100:#F4F4F5; --grey-200:#E4E4E7; --white:#FFFFFF;
    /* semantic — status only, never decoration (§7.1) */
    /* semantic — from apps/frontend theme (komkits.ts): success #00A854, info #00A2AE (teal), warning #FFBF00.
       Text shades use the scale's darker stops for contrast on light backgrounds. */
    --success:#00A04D; --success-bg:#E0F5EA; --success-bd:#A9E3C3;
    --info:#008694;    --info-bg:#E0F4F5;    --info-bd:#A5DEE2;
    --warning:#AD6800; --warning-bg:#FFF7E0; --warning-bd:#FFE58F;
    --radius:4px;
    --shadow-z1:0 1px 2px rgba(17,18,20,.06),0 1px 3px rgba(17,18,20,.08);
    --shadow-z2:0 8px 24px rgba(17,18,20,.10);
    --dur:200ms; --ease:cubic-bezier(.2,.8,.4,1);
    --max:1120px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  button,input,select,textarea{font:inherit;color:inherit;-webkit-appearance:none;appearance:none}
  [hidden]{display:none !important}
  html{scroll-behavior:smooth}
  body{font-family:'Public Sans',system-ui,sans-serif;background:var(--white);color:var(--ink-900);font-size:16px;line-height:1.55}
  img,svg{max-width:100%}
  .wrap{max-width:var(--max);margin:0 auto;padding:0 24px}
  section{padding:88px 0}
  @media(max-width:640px){.wrap{padding:0 16px}section{padding:64px 0}}
  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-500);margin-bottom:14px}
  h1,h2{letter-spacing:-.02em;line-height:1.12;text-wrap:balance}
  h2{font-size:clamp(28px,4vw,40px);font-weight:800}
  .lede{color:var(--ink-500);font-size:17px;max-width:56ch;margin-top:14px}
  .center{text-align:center}
  .center .lede{margin-left:auto;margin-right:auto}
  a{color:inherit}
  :focus-visible{outline:2px solid var(--ink-900);outline-offset:2px;border-radius:2px}
  /* buttons */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;padding:12px 24px;
    font:inherit;font-size:15px;font-weight:600;border-radius:var(--radius);border:1px solid transparent;
    cursor:pointer;text-decoration:none;transition:background var(--dur) var(--ease),border-color var(--dur) var(--ease),transform 120ms var(--ease)}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--ink-900);color:var(--white)}
  .btn-primary:hover{background:#26272B}
  .btn-secondary{background:var(--white);color:var(--ink-900);border-color:var(--grey-200)}
  .btn-secondary:hover{border-color:var(--ink-900)}
  .btn-lg{min-height:54px;padding:14px 30px;font-size:16px}
  /* chips — semantic only */
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:999px;border:1px solid var(--grey-200);background:var(--grey-100);color:var(--ink-700)}
  .chip .d{width:6px;height:6px;border-radius:50%;background:currentColor}
  .chip.live{background:var(--success-bg);border-color:var(--success-bd);color:var(--success)}
  .chip.soon{background:var(--info-bg);border-color:var(--info-bd);color:var(--info)}
  .chip.popular{background:var(--warning-bg);border-color:var(--warning-bd);color:var(--warning)}
  .chip.save{background:var(--success-bg);border-color:var(--success-bd);color:var(--success)}

  /* shared halftone backdrop mount (02-hero, 15-final) — bleeds past edges, fades in on first frame */
  .halftone-mount{position:absolute;inset:-40px;pointer-events:none;opacity:0;transition:opacity .6s var(--ease);z-index:0}
  .halftone-mount.ready{opacity:1}
  .halftone-mount canvas{width:100%;height:100%;display:block}

  /* shared scroll-reveal primitive: fade+rise on entrance, --i staggers grouped children.
     Hidden state is .js-gated so no-JS/SEO still renders content; reduced-motion shows instantly. */
  .js .reveal{opacity:0;transform:translateY(18px);transition:opacity .6s var(--ease),transform .6s var(--ease);
    transition-delay:calc(var(--i,0)*80ms);will-change:opacity,transform}
  .js .reveal.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){ .js .reveal{opacity:1;transform:none;transition:none} }

  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
    html{scroll-behavior:auto}
  }

<body>
<script>
/* ---------- prototype plumbing (production: framer-motion + TanStack Query; spec §6) ---------- */
/* shared by every section script below — declared once, before any of them run */
const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;
/* mark JS present before any .reveal markup is parsed below → no hidden-then-shown flash */
document.documentElement.classList.add('js');

/* shared scroll-reveal: toggle .in the first time each .reveal enters view (production: framer-motion whileInView) */
addEventListener('DOMContentLoaded',()=>{
  const els=document.querySelectorAll('.reveal');
  if(reduceMotion){ els.forEach(el=>el.classList.add('in')); return; }
  const io=new IntersectionObserver(es=>es.forEach(e=>{
    if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target); }
  }),{rootMargin:'0px 0px -10% 0px',threshold:.15});
  els.forEach(el=>io.observe(el));
});

/* ---------- shared halftone dot-field rig (ref: twenty.com HalftoneImageBackdrop, ---------- */
/* re-expressed as a 2D canvas — no three.js, no deps). Used by 02-hero (ambient field) and    */
/* 15-final (letterform). One rig; each mount supplies its own radiusAt(). Handles DPR, resize, */
/* first-frame fade-in, reduced-motion single frame, offscreen/tab-hidden pause, pointer track. */
function htHash(x,y){ const s=Math.sin(x*127.1+y*311.7)*43758.5453; return s-Math.floor(s); }
function htNoise(x,y){
  const xi=Math.floor(x), yi=Math.floor(y), xf=x-xi, yf=y-yi;
  const u=xf*xf*(3-2*xf), v=yf*yf*(3-2*yf);
  return htHash(xi,yi)*(1-u)*(1-v)+htHash(xi+1,yi)*u*(1-v)+htHash(xi,yi+1)*(1-u)*v+htHash(xi+1,yi+1)*u*v;
}
function makeHalftone(canvas, mount, host, opts){
  const ctx = canvas.getContext('2d');
  const GAP = opts.gap || 18;
  let w=0, h=0, dpr=1, cols=0, rows=0;
  let px=-1e4, py=-1e4;               /* pointer, canvas coords */
  let running=false, raf=0, t=0;

  function resize(){
    const r = mount.getBoundingClientRect();
    dpr = Math.min(devicePixelRatio||1, 2);
    w = r.width; h = r.height;
    canvas.width = w*dpr; canvas.height = h*dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
    cols = Math.ceil(w/GAP); rows = Math.ceil(h/GAP);
  }
  function frame(){
    ctx.clearRect(0,0,w,h);
    ctx.fillStyle = opts.color;
    for(let r=0;r<=rows;r++){
      for(let c=0;c<=cols;c++){
        const x=c*GAP, y=r*GAP;
        const rad = opts.radiusAt(c,r,x,y,t,px,py,w,h);
        if(rad<=0.18) continue;
        ctx.beginPath(); ctx.arc(x,y,rad,0,6.2832); ctx.fill();
      }
    }
    if(!mount.classList.contains('ready')) mount.classList.add('ready'); /* first-frame fade-in */
  }
  function loop(){ t+=0.016; frame(); raf=requestAnimationFrame(loop); }
  function start(){ if(running||reduceMotion) return; running=true; raf=requestAnimationFrame(loop); }
  function stop(){ running=false; cancelAnimationFrame(raf); }

  resize();
  addEventListener('resize',()=>{ resize(); if(reduceMotion) frame(); });
  if(matchMedia('(hover:hover) and (pointer:fine)').matches){
    host.addEventListener('pointermove',e=>{
      const r=mount.getBoundingClientRect();
      px=e.clientX-r.left; py=e.clientY-r.top;
    });
    host.addEventListener('pointerleave',()=>{ px=py=-1e4; });
  }
  if(reduceMotion){ frame(); return; }         /* static single frame, no loop */
  new IntersectionObserver(es=>es.forEach(e=>e.isIntersecting?start():stop()),{rootMargin:'80px'}).observe(mount);
  document.addEventListener('visibilitychange',()=>document.hidden?stop():start());
}
</script>
