<style>
  /* ================= nav ================= */
  .nav{position:sticky;top:12px;z-index:50;padding:0 24px;pointer-events:none;
    transition:top .3s var(--ease)}
  .nav-in{max-width:var(--max);margin:0 auto;display:flex;align-items:center;gap:8px;
    min-height:56px;padding:0 8px 0 20px;
    background:rgba(255,255,255,.72);backdrop-filter:blur(16px) saturate(1.6);-webkit-backdrop-filter:blur(16px) saturate(1.6);
    border:1px solid rgba(228,228,231,.6);border-radius:16px;
    box-shadow:0 1px 3px rgba(17,18,20,.04),0 8px 32px rgba(17,18,20,.06);
    pointer-events:auto;
    transition:background .35s var(--ease),box-shadow .35s var(--ease),border-color .35s var(--ease),min-height .3s var(--ease),border-radius .3s var(--ease),top .3s var(--ease)}
  /* when user has scrolled — slightly more opaque, tighter */
  .nav.scrolled .nav-in{background:rgba(255,255,255,.88);box-shadow:0 1px 2px rgba(17,18,20,.05),0 12px 40px rgba(17,18,20,.08);border-color:rgba(228,228,231,.8)}

  /* brand */
  .brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:-.02em;text-decoration:none;flex-shrink:0}
  .brand-mark{width:30px;height:30px;border-radius:8px;background:var(--ink-900);display:grid;place-items:center;
    transition:transform .25s var(--ease),box-shadow .25s var(--ease)}
  .brand:hover .brand-mark{transform:scale(1.08) rotate(-3deg);box-shadow:0 2px 8px rgba(17,18,20,.18)}
  .brand-mark svg{width:16px;height:16px;stroke:var(--white)}

  /* nav links — pill-shaped container centered */
  .nav-links{display:flex;gap:2px;margin:0 auto;align-items:center;
    background:rgba(244,244,245,.6);border-radius:10px;padding:3px}
  .nav-links a{font-size:13.5px;font-weight:600;color:var(--ink-500);text-decoration:none;padding:7px 14px;border-radius:8px;
    position:relative;transition:color .2s var(--ease),background .2s var(--ease)}
  .nav-links a:hover{color:var(--ink-900);background:var(--white);box-shadow:0 1px 3px rgba(17,18,20,.06)}
  .nav-links a.active{color:var(--ink-900);background:var(--white);box-shadow:0 1px 4px rgba(17,18,20,.08)}

  /* right-side CTA */
  .nav-cta{display:flex;gap:6px;align-items:center;flex-shrink:0;margin-left:4px}
  .nav-cta .btn{min-height:36px;padding:7px 16px;font-size:13.5px;border-radius:10px}
  .nav-cta .btn-secondary{border-color:transparent;background:transparent;color:var(--ink-700)}
  .nav-cta .btn-secondary:hover{color:var(--ink-900);background:var(--grey-100)}
  .nav-cta .btn-primary{background:var(--ink-900);color:var(--white);border-radius:10px;
    box-shadow:0 1px 3px rgba(17,18,20,.1),0 0 0 1px rgba(17,18,20,.04);
    transition:background .2s var(--ease),transform 120ms var(--ease),box-shadow .2s var(--ease)}
  .nav-cta .btn-primary:hover{background:#26272B;box-shadow:0 2px 8px rgba(17,18,20,.18),0 0 0 1px rgba(17,18,20,.06)}
  .cta-short{display:none}

  /* hamburger toggle (hidden on desktop) */
  .nav-toggle{display:none;flex-direction:column;justify-content:center;gap:5px;
    width:36px;height:36px;padding:8px;border:none;background:transparent;cursor:pointer;border-radius:8px;
    transition:background .2s var(--ease)}
  .nav-toggle:hover{background:var(--grey-100)}
  .nav-toggle span{display:block;width:100%;height:2px;background:var(--ink-900);border-radius:2px;
    transition:transform .3s var(--ease),opacity .2s var(--ease)}
  .nav-toggle.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
  .nav-toggle.open span:nth-child(2){opacity:0}
  .nav-toggle.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

  /* mobile drawer */
  .nav-drawer{display:none}

  /* ---- responsive ---- */
  @media (max-width:860px){
    .nav-links{display:none}
    .nav-toggle{display:flex}
    .nav-drawer{display:none;position:fixed;inset:0;top:0;z-index:49;
      background:rgba(17,18,20,.3);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);opacity:0;
      transition:opacity .3s var(--ease);pointer-events:none}
    .nav-drawer.open{display:block;opacity:1;pointer-events:auto}
    .nav-drawer-panel{position:fixed;top:0;right:0;width:min(320px,85vw);height:100%;
      background:var(--white);box-shadow:-4px 0 24px rgba(17,18,20,.1);
      transform:translateX(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);
      display:flex;flex-direction:column;padding:24px}
    .nav-drawer.open .nav-drawer-panel{transform:none}
    .nav-drawer-close{align-self:flex-end;width:36px;height:36px;border:none;background:var(--grey-100);
      border-radius:8px;cursor:pointer;display:grid;place-items:center;margin-bottom:24px;
      transition:background .2s var(--ease)}
    .nav-drawer-close:hover{background:var(--grey-200)}
    .nav-drawer-close svg{width:16px;height:16px;stroke:var(--ink-900);stroke-width:2}
    .nav-drawer-links{display:flex;flex-direction:column;gap:4px}
    .nav-drawer-links a{font-size:16px;font-weight:600;color:var(--ink-700);text-decoration:none;
      padding:12px 16px;border-radius:10px;transition:background .2s var(--ease),color .2s var(--ease)}
    .nav-drawer-links a:hover,.nav-drawer-links a.active{background:var(--grey-100);color:var(--ink-900)}
    .nav-drawer-ctas{margin-top:auto;display:flex;flex-direction:column;gap:8px;padding-top:24px;border-top:1px solid var(--grey-200)}
    .nav-drawer-ctas .btn{width:100%;justify-content:center;min-height:48px;font-size:15px;border-radius:10px}
  }
  @media (max-width:600px){
    .nav{padding:0 12px;top:8px}
    .nav-in{padding:0 6px 0 14px}
    .nav-cta .btn-secondary{padding:7px 10px}
    .cta-full{display:none}
    .cta-short{display:inline}
  }
</style>

      <svg viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <nav class="nav-drawer-links" aria-label="Mobile navigation">
      <a href="#modules">Modules</a>
      <a href="#ai">AI</a>
      <a href="#integrations">Integrations</a>
      <a href="#pricing">Pricing</a>
      <a href="#faq">FAQ</a>
    </nav>
    <div class="nav-drawer-ctas">
      <a class="btn btn-secondary" href="komkits-onboarding-mockups.html">Login</a>
      <a class="btn btn-primary" href="komkits-onboarding-mockups.html">Get Started Free</a>
    </div>
  </div>
</div>

<script>
/* ---------- nav: scroll-aware styling + mobile drawer ---------- */
(function(){
  const nav = document.getElementById('site-nav');
  const toggle = nav.querySelector('.nav-toggle');
  const drawer = document.getElementById('nav-drawer');
  const closeBtn = drawer.querySelector('.nav-drawer-close');

  /* scroll → compact/opaque */
  let ticking = false;
  function onScroll(){
    if(!ticking){ requestAnimationFrame(()=>{ nav.classList.toggle('scrolled', scrollY > 32); ticking=false; }); ticking=true; }
  }
  addEventListener('scroll', onScroll, {passive:true});
  onScroll();

  /* active link highlight based on scroll position */
  const links = nav.querySelectorAll('.nav-links a');
  const drawerLinks = drawer.querySelectorAll('.nav-drawer-links a');
  const allLinks = [...links, ...drawerLinks];
  const sectionIds = [...links].map(a => a.getAttribute('href').replace('#','')).filter(Boolean);
  function highlightActive(){
    let current = '';
    for(const id of sectionIds){
      const el = document.getElementById(id);
      if(el && el.getBoundingClientRect().top <= 120) current = id;
    }
    allLinks.forEach(a => a.classList.toggle('active', a.getAttribute('href') === '#'+current));
  }
  addEventListener('scroll', ()=>{ if(!ticking){ requestAnimationFrame(()=>{ highlightActive(); }); } }, {passive:true});
  addEventListener('DOMContentLoaded', highlightActive);

  /* mobile drawer toggle */
  function openDrawer(){ drawer.classList.add('open'); drawer.setAttribute('aria-hidden','false'); toggle.classList.add('open'); toggle.setAttribute('aria-expanded','true'); document.body.style.overflow='hidden'; }
  function closeDrawer(){ drawer.classList.remove('open'); drawer.setAttribute('aria-hidden','true'); toggle.classList.remove('open'); toggle.setAttribute('aria-expanded','false'); document.body.style.overflow=''; }
  toggle.addEventListener('click', ()=> drawer.classList.contains('open') ? closeDrawer() : openDrawer());
  closeBtn.addEventListener('click', closeDrawer);
  drawer.addEventListener('click', e=>{ if(e.target===drawer) closeDrawer(); });
  drawer.querySelectorAll('a').forEach(a=> a.addEventListener('click', closeDrawer));
})();
</script>
