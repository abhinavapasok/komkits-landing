<script>
/* ===== final-CTA halftone backdrop (Variant B: halftone "K" letterform + pointer ripple) ===== */
(function(){
  const mount=document.getElementById('ht-cta-mount');
  if(!mount) return;
  const host=mount.closest('.final');

  /* offscreen luminance source: big "K" letterform (production: screenshot/logo mark) */
  const SRC=140;
  const off=document.createElement('canvas'); off.width=off.height=SRC;
  const octx=off.getContext('2d',{willReadFrequently:true});
  octx.fillStyle='#000'; octx.fillRect(0,0,SRC,SRC);
  octx.fillStyle='#fff';
  octx.font='900 150px "Public Sans",system-ui,sans-serif';
  octx.textAlign='center'; octx.textBaseline='middle';
  octx.fillText('K',SRC/2,SRC/2+8);
  const lum=octx.getImageData(0,0,SRC,SRC).data;
  function lumAt(u,v){
    const ix=Math.min(SRC-1,Math.max(0,(u*SRC)|0)), iy=Math.min(SRC-1,Math.max(0,(v*SRC)|0));
    return lum[(iy*SRC+ix)*4]/255;
  }

  makeHalftone(document.getElementById('ht-cta'), mount, host, {
    gap:14, color:'rgba(255,255,255,.32)',
    radiusAt(c,r,x,y,t,px,py,w,h){
      /* sample the letterform from the right half of the block, vertically centered */
      const size=Math.min(h*1.1,w*0.5);
      const ox=w*0.72-size/2, oy=h/2-size/2;
      const u=(x-ox)/size, v=(y-oy)/size;
      let base=0.35;                                       /* faint ambient grain */
      if(u>=0&&u<=1&&v>=0&&v<=1) base += lumAt(u,v)*3.1;   /* letterform body */
      const ripple = reduceMotion?0 : Math.sin(t*1.4 + c*0.5 + r*0.35)*0.18;
      const d=Math.hypot(x-px,y-py);
      const boost=Math.max(0,1-d/150);
      return (base + ripple + boost*boost*2.2)*0.9 - 0.35;
    }
  });
})();
</script>
